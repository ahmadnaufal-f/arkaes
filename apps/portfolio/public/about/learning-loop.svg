<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 220" width="100%" preserveAspectRatio="xMidYMid meet">

  <!-- Outer boundary -->
  <rect x="20" y="20" width="740" height="180" rx="8" fill="none" stroke="#d4cec8" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="40" y="46" font-family="'DM Mono', 'Courier New', monospace" font-size="9" fill="#9d9185" letter-spacing="0.18em">LEARN BY SHIPPING</text>

  <!-- Step 01 -->
  <rect x="40" y="62" width="157" height="64" rx="4" fill="#faf9f7" stroke="#ddd7cf" stroke-width="1"/>
  <text x="54" y="82" font-family="'DM Mono', 'Courier New', monospace" font-size="8" fill="#8f554d" letter-spacing="0.14em">01</text>
  <text x="54" y="102" font-family="'Fraunces', Georgia, serif" font-size="13" font-style="italic" fill="#17130f">Identify</text>
  <text x="54" y="118" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="8.5" font-weight="300" fill="#76695f">a real problem</text>

  <line x1="201" y1="94" x2="217" y2="94" stroke="#c8c2ba" stroke-width="0.75"/>
  <path d="M 212 90 L 217 94 L 212 98" fill="none" stroke="#c8c2ba" stroke-width="0.75"/>

  <!-- Step 02 -->
  <rect x="221" y="62" width="157" height="64" rx="4" fill="#faf9f7" stroke="#ddd7cf" stroke-width="1"/>
  <text x="235" y="82" font-family="'DM Mono', 'Courier New', monospace" font-size="8" fill="#8f554d" letter-spacing="0.14em">02</text>
  <text x="235" y="102" font-family="'Fraunces', Georgia, serif" font-size="13" font-style="italic" fill="#17130f">Design</text>
  <text x="235" y="118" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="8.5" font-weight="300" fill="#76695f">the flow and interface</text>

  <line x1="382" y1="94" x2="398" y2="94" stroke="#c8c2ba" stroke-width="0.75"/>
  <path d="M 393 90 L 398 94 L 393 98" fill="none" stroke="#c8c2ba" stroke-width="0.75"/>

  <!-- Step 03 -->
  <rect x="402" y="62" width="157" height="64" rx="4" fill="#faf9f7" stroke="#ddd7cf" stroke-width="1"/>
  <text x="416" y="82" font-family="'DM Mono', 'Courier New', monospace" font-size="8" fill="#8f554d" letter-spacing="0.14em">03</text>
  <text x="416" y="102" font-family="'Fraunces', Georgia, serif" font-size="13" font-style="italic" fill="#17130f">Build</text>
  <text x="416" y="118" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="8.5" font-weight="300" fill="#76695f">the system</text>

  <line x1="563" y1="94" x2="579" y2="94" stroke="#c8c2ba" stroke-width="0.75"/>
  <path d="M 574 90 L 579 94 L 574 98" fill="none" stroke="#c8c2ba" stroke-width="0.75"/>

  <!-- Step 04 -->
  <rect x="583" y="62" width="157" height="64" rx="4" fill="#faf9f7" stroke="#ddd7cf" stroke-width="1"/>
  <text x="597" y="82" font-family="'DM Mono', 'Courier New', monospace" font-size="8" fill="#8f554d" letter-spacing="0.14em">04</text>
  <text x="597" y="102" font-family="'Fraunces', Georgia, serif" font-size="13" font-style="italic" fill="#17130f">Ship</text>
  <text x="597" y="118" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="8.5" font-weight="300" fill="#76695f">to real users</text>

  <!-- Return loop: ship feeds the next idea -->
  <path d="M 661 126 L 661 158 Q 661 166 653 166 L 126 166 Q 118 166 118 158 L 118 132" fill="none" stroke="#8e9d75" stroke-width="0.75"/>
  <path d="M 113 137 L 118 130 L 123 137" fill="none" stroke="#8e9d75" stroke-width="0.75"/>
  <rect x="296" y="159" width="188" height="14" fill="#fbf8f3"/>
  <text x="390" y="169" text-anchor="middle" font-family="'DM Mono', 'Courier New', monospace" font-size="8" fill="#5f6f48" letter-spacing="0.14em">LEARN · REFINE · REPEAT</text>

</svg>
