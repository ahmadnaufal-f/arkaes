<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 290" width="100%" preserveAspectRatio="xMidYMid meet">

  <!-- ── Col 1: Structured Grid ── -->
  <rect x="20" y="20" width="228" height="250" rx="6" fill="#faf9f7" stroke="#d4cec8" stroke-width="1"/>
  <!-- Pill label -->
  <rect x="52" y="36" width="164" height="22" rx="11" fill="#e2e7d6"/>
  <text x="134" y="51" text-anchor="middle" font-family="'DM Mono','Courier New',monospace" font-size="8" fill="#5f6f48" letter-spacing="0.12em">STRUCTURED GRID</text>
  <!-- Mini illustration: 3×2 grid of cards, one focused -->
  <rect x="48" y="72" width="56" height="38" rx="3" fill="#f1eee9" stroke="#d4cec8" stroke-width="0.75"/>
  <rect x="114" y="72" width="56" height="38" rx="3" fill="#edf1e4" stroke="#aeb997" stroke-width="1.5"/>
  <rect x="180" y="72" width="56" height="38" rx="3" fill="#f1eee9" stroke="#d4cec8" stroke-width="0.75"/>
  <rect x="48" y="118" width="56" height="38" rx="3" fill="#f1eee9" stroke="#d4cec8" stroke-width="0.75"/>
  <rect x="114" y="118" width="56" height="38" rx="3" fill="#f1eee9" stroke="#d4cec8" stroke-width="0.75"/>
  <rect x="180" y="118" width="56" height="38" rx="3" fill="#f1eee9" stroke="#d4cec8" stroke-width="0.75"/>
  <!-- Focus ring indicator -->
  <rect x="112" y="70" width="60" height="42" rx="4" fill="none" stroke="#5f6f48" stroke-width="1.5"/>
  <!-- Index label on focused card -->
  <text x="142" y="96" text-anchor="middle" font-family="'DM Mono','Courier New',monospace" font-size="9" fill="#5f6f48">idx</text>
  <!-- Nav arrows -->
  <text x="134" y="186" text-anchor="middle" font-family="'Plus Jakarta Sans',system-ui,sans-serif" font-size="9" font-weight="300" fill="#76695f">Index-based movement</text>
  <text x="134" y="202" text-anchor="middle" font-family="'Plus Jakarta Sans',system-ui,sans-serif" font-size="9" font-weight="300" fill="#76695f">across rows and columns</text>
  <!-- Direction hint -->
  <text x="134" y="224" text-anchor="middle" font-family="'DM Mono','Courier New',monospace" font-size="8" fill="#aeb997">↑ ↓  idx ± column count</text>
  <text x="134" y="238" text-anchor="middle" font-family="'DM Mono','Courier New',monospace" font-size="8" fill="#aeb997">← →  idx ± 1</text>

  <!-- ── Col 2: Static Scattered ── -->
  <rect x="276" y="20" width="228" height="250" rx="6" fill="#faf9f7" stroke="#d4cec8" stroke-width="1"/>
  <rect x="308" y="36" width="164" height="22" rx="11" fill="#f2ddd7"/>
  <text x="390" y="51" text-anchor="middle" font-family="'DM Mono','Courier New',monospace" font-size="8" fill="#8f554d" letter-spacing="0.12em">STATIC SCATTERED</text>
  <!-- Scattered elements with predefined arrows -->
  <rect x="296" y="72" width="70" height="34" rx="3" fill="#f1eee9" stroke="#d4cec8" stroke-width="0.75"/>
  <text x="331" y="93" text-anchor="middle" font-family="'DM Mono','Courier New',monospace" font-size="8" fill="#76695f">A</text>
  <rect x="410" y="80" width="70" height="34" rx="3" fill="#f1eee9" stroke="#d4cec8" stroke-width="0.75"/>
  <text x="445" y="101" text-anchor="middle" font-family="'DM Mono','Courier New',monospace" font-size="8" fill="#76695f">B</text>
  <rect x="296" y="138" width="70" height="34" rx="3" fill="#f2ddd7" stroke="#e9c8be" stroke-width="1.5"/>
  <text x="331" y="159" text-anchor="middle" font-family="'DM Mono','Courier New',monospace" font-size="9" fill="#8f554d">C</text>
  <rect x="400" y="130" width="70" height="34" rx="3" fill="#f1eee9" stroke="#d4cec8" stroke-width="0.75"/>
  <text x="435" y="151" text-anchor="middle" font-family="'DM Mono','Courier New',monospace" font-size="8" fill="#76695f">D</text>
  <!-- Predefined arrows A→B, B→C, C→D, A→C -->
  <line x1="366" y1="89" x2="410" y2="94" stroke="#e9c8be" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="331" y1="106" x2="331" y2="138" stroke="#e9c8be" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="366" y1="155" x2="400" y2="148" stroke="#e9c8be" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="390" y="186" text-anchor="middle" font-family="'Plus Jakarta Sans',system-ui,sans-serif" font-size="9" font-weight="300" fill="#76695f">Predefined focus targets</text>
  <text x="390" y="202" text-anchor="middle" font-family="'Plus Jakarta Sans',system-ui,sans-serif" font-size="9" font-weight="300" fill="#76695f">via HTML data attributes</text>
  <text x="390" y="224" text-anchor="middle" font-family="'DM Mono','Courier New',monospace" font-size="8" fill="#aeb997">data-focus-up="..."</text>
  <text x="390" y="238" text-anchor="middle" font-family="'DM Mono','Courier New',monospace" font-size="8" fill="#aeb997">data-focus-down="..."</text>

  <!-- ── Col 3: Dynamic Scattered ── -->
  <rect x="532" y="20" width="228" height="250" rx="6" fill="#faf9f7" stroke="#d4cec8" stroke-width="1"/>
  <rect x="553" y="36" width="186" height="22" rx="11" fill="#eae7f0"/>
  <text x="646" y="51" text-anchor="middle" font-family="'DM Mono','Courier New',monospace" font-size="8" fill="#5a4d7a" letter-spacing="0.12em">DYNAMIC SCATTERED</text>
  <!-- Dynamic elements with recalculate indicator -->
  <rect x="552" y="72" width="60" height="30" rx="3" fill="#f1eee9" stroke="#d4cec8" stroke-width="0.75"/>
  <rect x="668" y="84" width="60" height="30" rx="3" fill="#f1eee9" stroke="#d4cec8" stroke-width="0.75"/>
  <rect x="590" y="128" width="60" height="30" rx="3" fill="#f1eee9" stroke="#d4cec8" stroke-width="0.75"/>
  <rect x="660" y="118" width="60" height="30" rx="3" fill="#f1eee9" stroke="#d4cec8" stroke-width="0.75"/>
  <!-- Recalculate arrow -->
  <path d="M630,96 A24,24 0 1,1 630,97" stroke="#b0a8c0" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <text x="646" y="106" text-anchor="middle" font-family="'DM Mono','Courier New',monospace" font-size="9" fill="#7a6f90">↻</text>
  <text x="646" y="186" text-anchor="middle" font-family="'Plus Jakarta Sans',system-ui,sans-serif" font-size="9" font-weight="300" fill="#76695f">Position calculated after</text>
  <text x="646" y="202" text-anchor="middle" font-family="'Plus Jakarta Sans',system-ui,sans-serif" font-size="9" font-weight="300" fill="#76695f">each render, then cached</text>
  <text x="646" y="224" text-anchor="middle" font-family="'DM Mono','Courier New',monospace" font-size="8" fill="#aeb997">getBoundingClientRect()</text>
  <text x="646" y="238" text-anchor="middle" font-family="'DM Mono','Courier New',monospace" font-size="8" fill="#aeb997">→ focus map generated</text>

</svg>
