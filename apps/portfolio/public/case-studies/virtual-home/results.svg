<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 190" width="100%" preserveAspectRatio="xMidYMid meet">

  <!-- Background card -->
  <rect width="780" height="190" rx="8" fill="#faf9f7" stroke="#d4cec8" stroke-width="1"/>

  <!-- Column dividers -->
  <line x1="156" y1="0" x2="156" y2="190" stroke="#ede8e2" stroke-width="0.75"/>
  <line x1="312" y1="0" x2="312" y2="190" stroke="#ede8e2" stroke-width="0.75"/>
  <line x1="468" y1="0" x2="468" y2="190" stroke="#ede8e2" stroke-width="0.75"/>
  <line x1="624" y1="0" x2="624" y2="190" stroke="#ede8e2" stroke-width="0.75"/>

  <!-- ── Col 1: SHARING ── -->
  <rect x="24" y="24" width="108" height="22" rx="11" fill="#e2e7d6"/>
  <text x="78" y="39" text-anchor="middle" font-family="'DM Mono', 'Courier New', monospace" font-size="8" fill="#5f6f48" letter-spacing="0.12em">CODE SHARING</text>
  <text x="78" y="112" text-anchor="middle" font-family="'Fraunces', Georgia, serif" font-size="50" font-weight="300" fill="#5f6f48">±87%</text>
  <line x1="24" y1="126" x2="132" y2="126" stroke="#c5ceb5" stroke-width="0.5"/>
  <text x="78" y="146" text-anchor="middle" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="9" font-weight="300" fill="#5f534a">UI &amp; logic shared</text>
  <text x="78" y="162" text-anchor="middle" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="9" font-weight="300" fill="#9d9185">across variants</text>

  <!-- ── Col 2: APP SIZE ── -->
  <rect x="181" y="24" width="106" height="22" rx="11" fill="#e2e7d6"/>
  <text x="234" y="39" text-anchor="middle" font-family="'DM Mono', 'Courier New', monospace" font-size="8" fill="#5f6f48" letter-spacing="0.12em">BUNDLE SIZE</text>
  <text x="234" y="112" text-anchor="middle" font-family="'Fraunces', Georgia, serif" font-size="50" font-weight="300" fill="#5f6f48">±40%</text>
  <line x1="181" y1="126" x2="287" y2="126" stroke="#c5ceb5" stroke-width="0.5"/>
  <text x="234" y="146" text-anchor="middle" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="9" font-weight="300" fill="#5f534a">reduction in</text>
  <text x="234" y="162" text-anchor="middle" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="9" font-weight="300" fill="#9d9185">app size</text>

  <!-- ── Col 3: LOAD TIME ── -->
  <rect x="337" y="24" width="106" height="22" rx="11" fill="#e2e7d6"/>
  <text x="390" y="39" text-anchor="middle" font-family="'DM Mono', 'Courier New', monospace" font-size="8" fill="#5f6f48" letter-spacing="0.12em">LOAD SPEED</text>
  <text x="390" y="112" text-anchor="middle" font-family="'Fraunces', Georgia, serif" font-size="50" font-weight="300" fill="#5f6f48">±65%</text>
  <line x1="337" y1="126" x2="443" y2="126" stroke="#c5ceb5" stroke-width="0.5"/>
  <text x="390" y="146" text-anchor="middle" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="9" font-weight="300" fill="#5f534a">faster time</text>
  <text x="390" y="162" text-anchor="middle" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="9" font-weight="300" fill="#9d9185">to interactive</text>

  <!-- ── Col 4: BUG FIXES ── -->
  <rect x="493" y="24" width="106" height="22" rx="11" fill="#f2ddd7"/>
  <text x="546" y="39" text-anchor="middle" font-family="'DM Mono', 'Courier New', monospace" font-size="8" fill="#8f554d" letter-spacing="0.12em">BUG FIXES</text>
  <text x="546" y="112" text-anchor="middle" font-family="'Fraunces', Georgia, serif" font-size="50" font-weight="300" fill="#8f554d">±70%</text>
  <line x1="493" y1="126" x2="599" y2="126" stroke="#e9c8be" stroke-width="0.5"/>
  <text x="546" y="146" text-anchor="middle" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="9" font-weight="300" fill="#5f534a">faster bug</text>
  <text x="546" y="162" text-anchor="middle" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="9" font-weight="300" fill="#9d9185">investigation</text>

  <!-- ── Col 5: ONBOARDING ── -->
  <rect x="643" y="24" width="114" height="22" rx="11" fill="#f2ddd7"/>
  <text x="700" y="39" text-anchor="middle" font-family="'DM Mono', 'Courier New', monospace" font-size="8" fill="#8f554d" letter-spacing="0.12em">ONBOARDING</text>
  <text x="702" y="112" text-anchor="middle" font-family="'Fraunces', Georgia, serif" font-size="50" font-weight="300" fill="#8f554d">±31%</text>
  <line x1="643" y1="126" x2="757" y2="126" stroke="#e9c8be" stroke-width="0.5"/>
  <text x="702" y="146" text-anchor="middle" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="9" font-weight="300" fill="#5f534a">quicker new</text>
  <text x="702" y="162" text-anchor="middle" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="9" font-weight="300" fill="#9d9185">engineer ramp-up</text>

</svg>
