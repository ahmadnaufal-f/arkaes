name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Type check
        run: pnpm check

      - name: Lint
        # Storybook's build output is not in ESLint's ignore list; remove it so
        # lint does not scan the minified bundle (see CLAUDE.md).
        run: |
          rm -rf apps/storybook/storybook-static
          pnpm lint
